name: PRD Tracking & Management

on:
  push:
    paths:
      - 'prds/**/*.md'
  pull_request:
    paths:
      - 'prds/**/*.md'
  schedule:
    # Daily deadline check at 9 AM UTC
    - cron: '0 9 * * *'

jobs:
  prd-validation:
    runs-on: ubuntu-latest
    name: Validate PRD Format
    steps:
      - uses: actions/checkout@v4
      
      - name: Check PRD Template Compliance
        run: |
          echo "Validating PRD format and required fields..."
          
          # Check for required fields in PRDs
          for prd in prds/active/*.md; do
            echo "Checking $prd"
            
            # Required fields validation
            if ! grep -q "Priority:" "$prd"; then
              echo "ERROR: Missing Priority field in $prd"
              exit 1
            fi
            
            if ! grep -q "Deadline:" "$prd"; then
              echo "ERROR: Missing Deadline field in $prd"
              exit 1
            fi
            
            if ! grep -q "Revenue Impact:" "$prd"; then
              echo "ERROR: Missing Revenue Impact in $prd"
              exit 1
            fi
            
            if ! grep -q "## Acceptance Criteria" "$prd"; then
              echo "ERROR: Missing Acceptance Criteria section in $prd"
              exit 1
            fi
          done
          
          echo "All PRDs pass format validation ✅"

  deadline-tracker:
    runs-on: ubuntu-latest
    name: Check PRD Deadlines
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Approaching Deadlines
        run: |
          echo "Checking for approaching PRD deadlines..."
          
          current_date=$(date +%Y-%m-%d)
          tomorrow_date=$(date -d "+1 day" +%Y-%m-%d)
          
          # Check each active PRD for deadlines
          for prd in prds/active/*.md; do
            deadline=$(grep "Deadline:" "$prd" | cut -d' ' -f2)
            
            if [ "$deadline" != "PENDING" ] && [ "$deadline" \< "$tomorrow_date" ]; then
              echo "⚠️ DEADLINE APPROACHING: $prd - Due: $deadline"
              
              # Create GitHub issue for overdue PRD
              title="PRD Deadline Alert: $(basename $prd .md)"
              body="PRD deadline approaching or overdue. Please review and update status.
              
              File: $prd
              Deadline: $deadline
              Status: Needs attention"
              
              echo "Creating deadline alert issue..."
              echo "Title: $title"
              echo "Body: $body"
            fi
          done

  generate-dashboard:
    runs-on: ubuntu-latest
    name: Update PRD Dashboard
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate PRD Status Dashboard
        run: |
          echo "# PRD Status Dashboard" > PRD-DASHBOARD.md
          echo "" >> PRD-DASHBOARD.md
          echo "**Updated**: $(date)" >> PRD-DASHBOARD.md
          echo "" >> PRD-DASHBOARD.md
          
          # Count PRDs by status
          active_count=$(ls prds/active/*.md 2>/dev/null | wc -l)
          completed_count=$(ls prds/completed/*.md 2>/dev/null | wc -l)
          backlog_count=$(ls prds/backlog/*.md 2>/dev/null | wc -l)
          
          echo "## Summary" >> PRD-DASHBOARD.md
          echo "- 🚀 Active PRDs: $active_count" >> PRD-DASHBOARD.md
          echo "- ✅ Completed: $completed_count" >> PRD-DASHBOARD.md  
          echo "- 📋 Backlog: $backlog_count" >> PRD-DASHBOARD.md
          echo "" >> PRD-DASHBOARD.md
          
          # List active PRDs with priorities
          echo "## Active PRDs" >> PRD-DASHBOARD.md
          echo "" >> PRD-DASHBOARD.md
          
          for prd in prds/active/*.md; do
            if [ -f "$prd" ]; then
              name=$(basename "$prd" .md)
              priority=$(grep "Priority:" "$prd" | cut -d' ' -f2 | tr -d '*')
              deadline=$(grep "Deadline:" "$prd" | cut -d' ' -f2)
              
              # Priority emoji
              case $priority in
                "CRITICAL") priority_emoji="🚨" ;;
                "HIGH") priority_emoji="⚠️" ;;
                "MEDIUM") priority_emoji="🔶" ;;
                "LOW") priority_emoji="🔵" ;;
                *) priority_emoji="❓" ;;
              esac
              
              echo "- $priority_emoji **$name** - Priority: $priority, Deadline: $deadline" >> PRD-DASHBOARD.md
            fi
          done
          
          echo "PRD Dashboard generated ✅"
      
      - name: Commit Dashboard Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PRD-DASHBOARD.md
          if ! git diff --cached --quiet; then
            git commit -m "Update PRD dashboard [automated]"
            echo "Dashboard updated and committed"
          else
            echo "No dashboard changes to commit"
          fi